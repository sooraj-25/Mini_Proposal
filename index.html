<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>For Shehana ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="stars" id="stars"></div>

  <div class="center" id="envelopeScreen">

    <div class="envelope-wrapper">

      <div class="envelope" onclick="openLetter()">

        <div class="flap"></div>

        <div class="seal">
          S ❤️ S
        </div>

      </div>

      <div class="open-text">
        You got a letter Shehana
      </div>

    </div>

  </div>

  <div class="letter-screen" id="letterScreen">

    <button class="back-btn" onclick="goHome()">
      ← Back
    </button>

    <div class="letter">

      <div class="title">
        My Muwthumaniyee
      </div>

      <div id="typedText"></div>

      <div class="buttons" id="buttons">

        <button id="yesBtn" onclick="sayYes()">
          YES ❤️
        </button>

        <button id="noBtn">
          NO 😭
        </button>

      </div>

      <div class="funny-text" id="funnyText"></div>

    </div>

  </div>

  <div class="celebration" id="celebration">

    <button class="back-btn" onclick="backToLetter()">
      ← Back
    </button>

    <h1>She Said YES 💍</h1>

    <p>
      Forever begins now Muwtheee ❤️
    </p>

    <div class="ring">
      💍
    </div>

    <div class="footer">
      Made with endless love by your Kettiyon 😌
    </div>

  </div>

  <audio id="loveSong" loop>
    <source src="Odum Neram Niruthi - Vaa Senthaazhini _ Tamil Song.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>

</body>

</html>
